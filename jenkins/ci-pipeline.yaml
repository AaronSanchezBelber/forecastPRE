name: salesforecast-ci
description: Basic CI pipeline for the SalesForecast project

stages:
  - name: checkout
    steps:
      - run: echo "Checkout handled by Jenkins SCM"

  - name: setup-python
    steps:
      - run: python --version
      - run: python -m pip install --upgrade pip

  - name: install-deps
    steps:
      - run: python -m pip install -r requirements.txt

  - name: lint-basic
    steps:
      - run: python -m compileall src

  - name: tests
    steps:
      - run: python -m pytest || echo "No tests found"
