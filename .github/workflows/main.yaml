# =========================================================
# CI - Continuous Integration
# CD - Continuous Delivery
# CD - Continuous Deployment
# =========================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

permissions:
  id-token: write
  contents: read

# =========================================================
# 🔧 VARIABLES GLOBALES (NO SENSIBLES)
# =========================================================
env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: forecast-project
  GCP_ARTIFACT_REPOSITORY: networksecurity-repo
  IMAGE_NAME: networksecurity

jobs:

  # =========================================================
  # 🔎 CONTINUOUS INTEGRATION
  # =========================================================
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Aquí deberías activar Python y correr tests reales
      - name: Lint code
        run: echo "Running lint checks"

      - name: Run tests
        run: echo "Running unit tests"


  # =========================================================
  # 📦 CONTINUOUS DELIVERY (BUILD + PUSH)
  # =========================================================
  build-and-push-artifact:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Autenticación con GCP (esto sí es secreto)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker $GCP_REGION-docker.pkg.dev

      # 📦 Build con versionado por SHA (mejor que latest)
      - name: Build Docker image
        run: |
          docker build -t $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REPOSITORY/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REPOSITORY/$IMAGE_NAME:${{ github.sha }}

