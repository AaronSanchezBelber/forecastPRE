# CI - Integration
# CD - Delivery
# CD - Deployment


# Nombre del workflow que aparecerá en GitHub Actions
name: CI/CD Pipeline

# Evento que dispara el pipeline
on: 
  push:
    branches:
      - main 
    paths-ignore:
      - 'README.md'        # No se ejecuta si solo cambia el README

# Permisos necesarios para autenticación con GCP (OIDC)
permissions: 
  id-token: write        # Permite generar tokens OIDC para autenticación
  contents: read         # Permite leer el contenido del repositorio (necesario para checkout)

jobs:

  # =========================================================
  # 🔎 CONTINUOUS INTEGRATION (CI)
  # =========================================================
  integration: 
    name: Continuous Integration
    runs-on: ubuntu-latest  # Runner Linux administrado por GitHub

    steps:
      # 1️⃣ Checkout del código
      - name: Checkout code
        uses: actions/checkout@v3  # Acción oficial para clonar el repositorio

      # # 2️⃣ Configuración de Python
      # - name: Set up Python
      #   uses: actions/setup-python@v4  # Acción oficial para configurar Python
      #   with:
      #     python-version: '3.8'  # Versión de Python a usar

      # # 3️⃣ Instalación de dependencias
      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt  # Instala las dependencias listadas en requirements.txt

      # 2Linting
      # Aquí deberías ejecutar herramientas reales como:
      # flake8, pylint, black --check, etc.
      # El objetivo es validar calidad de código antes de construir imagen.
      - name: Lint code
        run: echo "Analizar el código en busca de errores de estilo"

      # 4️⃣ Ejecución de pruebas unitarias
      - name: Run tests
        run: echo "Analizar el código en busca de errores de test"
          
